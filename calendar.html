<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DueSoon</title>
    <link rel="stylesheet" href="style2.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.css"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>
    <script type="module">
      import { auth, db } from "./firebase.js";
      import {
        collection,
        getDocs,
        doc,
        updateDoc,
        deleteDoc,
        query,
        where,
      } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

      import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          window.location.href = "login.html";
          return;
        }

        const calendarEl = document.getElementById("calendar");

        const assignmentSnap = await getDocs(
          collection(db, "users", user.uid, "assignments"),
        );

        const assignmentEvents = [];

        assignmentSnap.forEach((doc) => {
          const data = doc.data();

          assignmentEvents.push({
            id: doc.id,
            title: `📌 ${data.AssignmentNameData}`,
            start: data.DateData,
            color: "red",
            extendedProps: { type: "assignment" },
          });
        });

        const sessionSnap = await getDocs(
          collection(db, "users", user.uid, "studySessions"),
        );

        const studyEvents = [];

        sessionSnap.forEach((docSnap) => {
          const data = docSnap.data();

          studyEvents.push({
            id: docSnap.id,
            title: `${data.title} (${data.studyTime}h)`,
            start: data.date,
            color: data.completed ? "green" : "blue",
            extendedProps: {
              type: "study",
              assignmentId: data.assignmentId, // ⭐ ADD THIS
            },
          });
        });

        const calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: "dayGridMonth",
          events: [...assignmentEvents, ...studyEvents],

          eventClick: async function (info) {
            const event = info.event;

            const confirmDelete = confirm(`Delete "${event.title}"?`);

            if (!confirmDelete) return;

            // STUDY SESSION
            if (event.extendedProps.type !== "assignment") {
              const ref = doc(db, "users", user.uid, "studySessions", event.id);
              await deleteDoc(ref);
            }

            // ASSIGNMENT
            else {
              // delete assignment from Firebase
              const ref = doc(db, "users", user.uid, "assignments", event.id);
              await deleteDoc(ref);

              // delete study sessions from Firebase
              const q = query(
                collection(db, "users", user.uid, "studySessions"),
                where("assignmentId", "==", event.id),
              );

              const snapshot = await getDocs(q);

              const deletes = snapshot.docs.map((docSnap) =>
                deleteDoc(docSnap.ref),
              );

              await Promise.all(deletes);

              // remove all related events from UI
              const allEvents = calendar.getEvents();

              allEvents.forEach((e) => {
                if (
                  e.id === event.id || // assignment
                  e.extendedProps.assignmentId === event.id // study sessions
                ) {
                  e.remove();
                }
              });
            }

            // Remove from calendar UI
            event.remove();
          },
        });

        calendar.render();
      });
    </script>
  </head>
  <body>
    <header>
      <div class="logo">DueSoon</div>
    </header>

    <div class="navigation_bar">
      <a href="home.html">Home</a>
      <a href="inputs.html">Inputs</a>
      <a href="calendar.html">Calendar</a>
    </div>
    <div class="spacing"></div>
    <div id="calendar"></div>
    <div class="calendar-container"></div>
  </body>
</html>
