<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DueSoon</title>
    <link rel="stylesheet" href="style2.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" type="text/css"/>
</head>
<body>
     <nav class="navbar navbar-expand">
        <ul class="navbar-nav ">
        
            <li class="navbar-item ">
                <a href="" class=" text-decoration-none text-light">Home</a>
            </li>
            <li class="navbar-item ">
                <a href="" class=" text-decoration-none text-light">Schedule</a>
            </li>
        </ul>
    </nav>

    <form action=" " method="post">
        <fieldset>
            <label for="type">What is due soon?</label>
          <select name="previous_type" id="type">
            <option value="exam">Exam/Test</option>
            <option value="assignment">Assignment</option>
          </select>

            <br><br>
            <label for="recommendationsLabel" id="recommendationsLabelID">Name of Assignment/Test</label>
            <br>
            <input id="recommendationsLabel" type="text" name="recommendations">

            <br><br>
            <label for="date">Due date:</label>
            <input type="date" id="date" name="due-date" />

            <br><br>
            <label for="difficulty">How difficult do expect this assignment or exam to be?</label>
          <select name="previous_difficulty" id="difficulty">
            <option value="very_easy">Very easy</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
            <option value="very_hard">Very Hard</option>
          </select>
          <br>
          <button type="submit" class="btn">Submit</button>
        </fieldset>    
    </form>    
</body>
