<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DueSoon</title>
    <link rel="stylesheet" href="style2.css" />
  </head>

  <body>
    <header>
      <div class="logo">DueSoon</div>
    </header>

    <div class="navigation_bar">
      <a href="home.html">Home</a>
      <a href="inputs.html">Inputs</a>
      <a href="calendar.html">Calendar</a>
    </div>
    <div class="spacing"></div>
    <form id="assignmentForm">
      <fieldset>
        <label for="type">What is due soon?</label>
        <select id="type">
          <option value="exam">Exam/Test</option>
          <option value="assignment">Assignment</option>
        </select>

        <div class="smallerspacing"></div>
        <label for="assignment_name">Name of Assignment/Test</label>
        <br />
        <input id="assignment_name" type="text" required />

        <div class="smallerspacing"></div>
        <label for="date">Due date:</label>
        <input type="date" id="date" required />

        <div class="smallerspacing"></div>
        <label for="difficulty"
          >How difficult do expect this assignment/test to be?</label
        >
        <select id="difficulty">
          <option value="very_easy">Very easy</option>
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
          <option value="very_hard">Very Hard</option>
        </select>

        <div class="smallerspacing"></div>
        <label for="time">How long do you expect to work on this (hours)?</label>
        <br />
        <input
          id="hours"
          type="number"
          min="0.5"
          step="0.5"
          placeholder="e.g. 5"
          required
        />

        <div class="smallerspacing"></div>
        <button type="submit" class="btn">Submit</button>
      </fieldset>
    </form>

    <script type="module">
      import {
        auth,
        db,
        collection,
        addDoc,
        addStudySessions,
      } from "./firebase.js";
      import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

      let currentUserId = null;

      // Auth check
      onAuthStateChanged(auth, (user) => {
        if (!user) {
          window.location.href = "login.html";
        } else {
          currentUserId = user.uid;
        }
      });

      window.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("assignmentForm");

        form.addEventListener("submit", async (e) => {
          e.preventDefault();

          const TypeData = document.getElementById("type").value;
          const AssignmentNameData =
            document.getElementById("assignment_name").value;
          const DateData = document.getElementById("date").value;
          const DifficultyData = document.getElementById("difficulty").value;
          const HoursData = parseFloat(document.getElementById("hours").value);

          try {
            const assignmentRef = await addDoc(
              collection(db, "users", currentUserId, "assignments"),
              {
                TypeData,
                AssignmentNameData,
                DateData,
                DifficultyData,
                HoursData,
              },
            );

            await addStudySessions(currentUserId, assignmentRef.id, {
              AssignmentNameData,
              DateData,
              DifficultyData,
              HoursData,
            });

            alert("Assignment + study plan created!");
            form.reset();
          } catch (e) {
            console.error("Error:", e);
          }
        });
      });
    </script>
  </body>
</html>
