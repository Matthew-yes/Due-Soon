<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DueSoon</title>
    <link rel="stylesheet" href="style2.css">
</head>

<body>

     <header>
        <div class="logo">DueSoon</div>
    </header>

    <div class="navigation_bar">
        <a href="home.html">Home</a>
        <a href="inputs.html">Inputs</a>
        <a href="calendar.html">Calendar</a>
        <a href="">Reminder</a>
    </div>
    <div class="spacing"></div>
    <form id="assignmentForm">
        <fieldset>
            <label for="type">What is due soon?</label>
            <select id="type">
                <option value="exam">Exam/Test</option>
                <option value="assignment">Assignment</option>
            </select>

            <div class="smallerspacing"></div>
            <label for="assignment_name">Name of Assignment/Test</label>
            <br>
            <input id="assignment_name" type="text" required>

            <div class="smallerspacing"></div>
            <label for="date">Due date:</label>
            <input type="date" id="date" required>

            <div class="smallerspacing"></div>
            <label for="difficulty">How difficult do expect this assignment or exam to be?</label>
            <select id="difficulty">
                <option value="very_easy">Very easy</option>
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
                <option value="very_hard">Very Hard</option>
            </select>

            <div class="smallerspacing"></div>
            <button type="submit" class="btn">Submit</button>
        </fieldset>
    </form id="assignmentForm">


    <script type="module">

        import { auth } from "./firebase.js";
        import {
            onAuthStateChanged,
            signOut,
        } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        let currentUserId=null;

        // Require sign in to access this page
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
            }
            else{
                currentUserId=user.uid;
            }
        });
        //Add Assignments
        import { db, collection, addDoc } from "./firebase.js";

        window.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById('assignmentForm');

            console.log("Form found:", form);

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const TypeData = document.getElementById('type').value;
                const AssignmentNameData = document.getElementById('assignment_name').value;
                const DateData = document.getElementById('date').value;
                const DifficultyData = document.getElementById('difficulty').value;

                try {
                    await addDoc(collection(db, "users", currentUserId, "assignments"), {
                        TypeData,
                        AssignmentNameData,
                        DateData,
                        DifficultyData
                    });

                    alert("Assignment added");
                    form.reset();
                } catch (e) {
                    console.error("Error adding assignment: ", e);
                }
            });
        });
    </script>

</body>
