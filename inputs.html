<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DueSoon</title>
    <link rel="stylesheet" href="style2.css">
</head>

<body>

    <header>
        <h1 class="logo">DueSoon</h1>
    </header>

    <div class="navigation_bar">
        <a href="">Home</a>
    </div>
    <div class="spacing"></div>

    <form action=" " method="post">
        <fieldset>
            <label for="type">What is due soon?</label>
            <select name="previous_type" id="type">
                <option value="exam">Exam/Test</option>
                <option value="assignment">Assignment</option>
            </select>

            <br><br>
            <label for="recommendationsLabel" id="recommendationsLabelID">Name of Assignment/Test</label>
            <br>
            <input id="recommendationsLabel" type="text" name="recommendations">

            <br><br>
            <label for="date">Due date:</label>
            <input type="date" id="date" name="due-date" />

            <br><br>
            <label for="difficulty">How difficult do expect this assignment or exam to be?</label>
            <select name="previous_difficulty" id="difficulty">
                <option value="very_easy">Very easy</option>
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
                <option value="very_hard">Very Hard</option>
            </select>
            <br>
            <button type="submit" class="btn">Submit</button>
        </fieldset>
    </form>
</body>
